<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://xmlns.jcp.org/jsf/passthrough">
<h:head>
    <title>Главная страница</title>
    <h:outputStylesheet library="css" name="main.css"/>
    <h:outputScript library="js" name="decimal.min.js" />
    <h:outputScript library="js" name="script.js"/>
</h:head>
<h:body >

    <div class="link-container">
        <h:button styleClass="index-button" value="" outcome="index" />
    </div>

    <div class="main-container">
        <div class="form-panel">
            <h2>Проверка попадания точки</h2>
            <h:form id="controlForm">
                <h3>Выберите X:</h3>
                <h:panelGroup id="xButtonsPanel" layout="block">
                    <div class="x-buttons-container">
                        <h:commandLink value="-5" action="#{receiptCoordBean.setX(-5)}" styleClass='big-link #{receiptCoordBean.x == -5 ? "selected-x" : ""}'>
                            <f:ajax execute="@this" render="xButtonsPanel"/>
                        </h:commandLink>
                        <h:commandLink value="-4" action="#{receiptCoordBean.setX(-4)}" styleClass='big-link #{receiptCoordBean.x == -4 ? "selected-x" : ""}'>
                            <f:ajax execute="@this" render="xButtonsPanel"/>
                        </h:commandLink>
                        <h:commandLink value="-3" action="#{receiptCoordBean.setX(-3)}" styleClass='big-link #{receiptCoordBean.x == -3 ? "selected-x" : ""}'>
                            <f:ajax execute="@this" render="xButtonsPanel"/>
                        </h:commandLink>
                        <h:commandLink value="-2" action="#{receiptCoordBean.setX(-2)}" styleClass='big-link #{receiptCoordBean.x == -2 ? "selected-x" : ""}'>
                            <f:ajax execute="@this" render="xButtonsPanel"/>
                        </h:commandLink>
                        <h:commandLink value="-1" action="#{receiptCoordBean.setX(-1)}" styleClass='big-link #{receiptCoordBean.x == -1 ? "selected-x" : ""}'>
                            <f:ajax execute="@this" render="xButtonsPanel"/>
                        </h:commandLink>
                        <h:commandLink value="0" action="#{receiptCoordBean.setX(0)}" styleClass='big-link #{receiptCoordBean.x == 0 ? "selected-x" : ""}'>
                            <f:ajax execute="@this" render="xButtonsPanel"/>
                        </h:commandLink>
                        <h:commandLink value="1" action="#{receiptCoordBean.setX(1)}" styleClass='big-link #{receiptCoordBean.x == 1 ? "selected-x" : ""}'>
                            <f:ajax execute="@this" render="xButtonsPanel"/>
                        </h:commandLink>
                        <h:commandLink value="2" action="#{receiptCoordBean.setX(2)}" styleClass='big-link #{receiptCoordBean.x == 2 ? "selected-x" : ""}'>
                            <f:ajax execute="@this" render="xButtonsPanel"/>
                        </h:commandLink>
                        <h:commandLink value="3" action="#{receiptCoordBean.setX(3)}" styleClass='big-link #{receiptCoordBean.x == 3 ? "selected-x" : ""}'>
                            <f:ajax execute="@this" render="xButtonsPanel"/>
                        </h:commandLink>
                    </div>
                </h:panelGroup>


                <h3>Введите Y:</h3>
                <h:inputText id="yInput" onfocus="clearYError()" value="#{receiptCoordBean.y}" styleClass="y-input-field" p:placeholder="[-5;5]">
                    <f:convertNumber type="number" locale="ru_RU" />
                    <f:ajax event="blur" execute="@this" render="yInput globalMessages" />
                </h:inputText>

                <h3>Выберите R:</h3>
                <h:panelGroup id="rButtonsPanel">
                    <div class="r-buttons-group">
                        <h:commandButton value="1" action="#{receiptCoordBean.setR(1)}" styleClass='r-button #{receiptCoordBean.r == 1 ? "selected-r" : ""}'>
                            <f:ajax execute="@this" render="rButtonsPanel graph-panel" onevent="function(){ updatePointsColor(1); }"/>
                        </h:commandButton>

                        <h:commandButton value="2" action="#{receiptCoordBean.setR(2)}" styleClass='r-button #{receiptCoordBean.r == 2 ? "selected-r" : ""}'>
                            <f:ajax execute="@this" render="rButtonsPanel graph-panel" onevent="function(){ updatePointsColor(2); }"/>
                        </h:commandButton>

                        <h:commandButton value="3" action="#{receiptCoordBean.setR(3)}" styleClass='r-button #{receiptCoordBean.r == 3 ? "selected-r" : ""}'>
                            <f:ajax execute="@this" render="rButtonsPanel graph-panel" onevent="function(){ updatePointsColor(3); }"/>
                        </h:commandButton>

                        <h:commandButton value="4" action="#{receiptCoordBean.setR(4)}" styleClass='r-button #{receiptCoordBean.r == 4 ? "selected-r" : ""}'>
                            <f:ajax execute="@this" render="rButtonsPanel graph-panel" onevent="function(){ updatePointsColor(4); }"/>
                        </h:commandButton>

                        <h:commandButton value="5" action="#{receiptCoordBean.setR(5)}" styleClass='r-button #{receiptCoordBean.r == 5 ? "selected-r" : ""}'>
                            <f:ajax execute="@this" render="rButtonsPanel graph-panel" onevent="function(){ updatePointsColor(5); }"/>
                        </h:commandButton>
                    </div>
                </h:panelGroup>


                <div id="errorContainer">
                    <h:messages id="globalMessages" globalOnly="true" showDetail="true" showSummary="false" styleClass="error-messages"/>
                    <div id="clientErrors" class="error-messages" style="display: none;">
                    </div>
                </div>

                <h:commandButton value="Проверить" styleClass="action-button submit-button" action="#{controllerBean.addPoint}" onclick="return validateForm();">
                    <f:ajax execute="@form" render="xButtonsPanel rButtonsPanel yInput pointsTable graph-panel globalMessages"
                            onevent="function(data) {
                            if (data.status === 'success') {
                                formatLocalTime();
                                updatePointsColor(parseFloat(document.getElementById('image').getAttribute('data-r')));
                                }
                            }"/>
                </h:commandButton>

                <h:commandButton value="Очистить" styleClass="action-button clear-button" action="#{controllerBean.clearPoint}">
                    <f:ajax execute="@this" render="xButtonsPanel rButtonsPanel yInput pointsTable graph-panel"
                            onevent="function(data) {
                                if (data.status === 'success') {
                                formatLocalTime();
                                updatePointsColor(parseFloat(document.getElementById('image').getAttribute('data-r')));
                    }
                }"/>
                </h:commandButton>

                <h:inputHidden id="clickX" value="#{receiptCoordBean.clickX}" />
                <h:inputHidden id="clickY" value="#{receiptCoordBean.clickY}" />

                <h:commandButton id="hiddenClickButton" action="#{controllerBean.addPoint}" style="display:none;">
                    <f:ajax execute="@form" render="clickX clickY pointsTable graph-panel globalMessages"
                            onevent="function(data) {
                            if (data.status === 'success') {
                            formatLocalTime();
                            updatePointsColor(parseFloat(document.getElementById('image').getAttribute('data-r')));
            }
        }"/>
                </h:commandButton>


            </h:form>
        </div>

        <h:panelGroup id="graph-panel" layout="block" styleClass="graph-panel">
            <svg id="image" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" data-r="#{receiptCoordBean.r}" onclick="handleSvgClick(event)">

                <line x1="37.5" x2="562.5" y1="300" y2="300" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.7"/>
                <line x1="300" x2="300" y1="37.5" y2="562.5" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.7"/>

                <polygon points="570,300 562.5,292.5 562.5,307.5" fill="#ffffff" stroke="#ffffff" stroke-opacity="0.7"/>
                <polygon points="300,30 307.5,37.5 292.5,37.5" fill="#ffffff" stroke="#ffffff" stroke-opacity="0.7"/>

                <text x="570" y="322.5" fill="#ffffff" font-size="14" font-family="Arial">x</text>
                <text x="277.5" y="30" fill="#ffffff" font-size="14" font-family="Arial">y</text>

                <rect x="300" y="300" width="225" height="112.5" fill="#00ffff" fill-opacity="0.4" stroke="#00ffff" stroke-width="1.5" stroke-opacity="0.6"/>
                <path d="M300 300 L300 187.5 A112.5 112.5 0 0 1 412.5 300 Z" fill="#ff00ff" fill-opacity="0.4" stroke="#ff00ff" stroke-width="1.5" stroke-opacity="0.6"/>
                <polygon points="300,300 75,300 300,412.5" fill="#ffff00" fill-opacity="0.4" stroke="#ffff00" stroke-width="1.5" stroke-opacity="0.6"/>

                <line x1="525" x2="525" y1="307.5" y2="292.5" stroke="#ffffff" stroke-opacity="0.7"/>
                <text id="x-R" x="517.5" y="285" fill="#ffffff" font-size="12" font-family="Arial">#{receiptCoordBean.RFormatted}</text>

                <line x1="412.5" x2="412.5" y1="307.5" y2="292.5" stroke="#ffffff" stroke-opacity="0.7"/>
                <text id="x-R2" x="405" y="285" fill="#ffffff" font-size="12" font-family="Arial">#{receiptCoordBean.halfRFormatted}</text>

                <line x1="187.5" x2="187.5" y1="307.5" y2="292.5" stroke="#ffffff" stroke-opacity="0.7"/>
                <text id="x-minus-R2" x="172.5" y="285" fill="#ffffff" font-size="12" font-family="Arial">#{receiptCoordBean.negHalfRFormatted}</text>

                <line x1="75" x2="75" y1="307.5" y2="292.5" stroke="#ffffff" stroke-opacity="0.7"/>
                <text id="x-minus-R" x="60" y="285" fill="#ffffff" font-size="12" font-family="Arial">#{receiptCoordBean.negRFormatted}</text>

                <line x1="307.5" x2="292.5" y1="187.5" y2="187.5" stroke="#ffffff" stroke-opacity="0.7"/>
                <text id="y-R2" x="315" y="195" fill="#ffffff" font-size="12" font-family="Arial">#{receiptCoordBean.halfRFormatted}</text>

                <line x1="307.5" x2="292.5" y1="75" y2="75" stroke="#ffffff" stroke-opacity="0.7"/>
                <text id="y-R" x="315" y="82.5" fill="#ffffff" font-size="12" font-family="Arial">#{receiptCoordBean.RFormatted}</text>

                <line x1="307.5" x2="292.5" y1="412.5" y2="412.5" stroke="#ffffff" stroke-opacity="0.7"/>
                <text id="y-minus-R2" x="315" y="420" fill="#ffffff" font-size="12" font-family="Arial">#{receiptCoordBean.negHalfRFormatted}</text>

                <line x1="307.5" x2="292.5" y1="525" y2="525" stroke="#ffffff" stroke-opacity="0.7"/>
                <text id="y-minus-R" x="315" y="532.5" fill="#ffffff" font-size="12" font-family="Arial">#{receiptCoordBean.negRFormatted}</text>
                <ui:repeat value="#{pointsBean.points}" var="p">
                    <circle cx="#{300 + (p.x * 225 / receiptCoordBean.r)}"
                            cy="#{300 - (p.y * 225 / receiptCoordBean.r)}"
                            r="4"
                            fill="#{p.hit ? 'lime' : 'red'}"
                            stroke="#ffffff"
                            stroke-width="1"
                            fill-opacity="0.8"
                            data-x="#{p.x}" data-y="#{p.y}">
                    </circle>
                </ui:repeat>
            </svg>
        </h:panelGroup>
    </div>

    <div class="table-container">
        <h:dataTable id="pointsTable" value="#{pointsBean.points}" var="point" border="1" styleClass="points-table" rowClasses="table-row">
            <h:column>
                <f:facet name="header">X</f:facet> #{point.x}
            </h:column>
            <h:column>
                <f:facet name="header">Y</f:facet> #{point.y}
            </h:column>
            <h:column>
                <f:facet name="header">R</f:facet> #{point.r}
            </h:column>
            <h:column>
                <f:facet name="header">Время выполнения (мс)</f:facet> #{point.execTime}
            </h:column>
            <h:column>
                <f:facet name="header">Время</f:facet>
                <span class="local-time" data-timestamp="#{point.curTimestamp}"></span>
            </h:column>
            <h:column>
                <f:facet name="header">Попадание</f:facet> #{point.hit ? ' ✅' : ' ❌'}
            </h:column>
        </h:dataTable>
    </div>
</h:body>
</html>
